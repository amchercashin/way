<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#c8b48c" />
  <meta name="description" content="Трекер пассивного дохода" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>HeroIncome</title>
  <style>
    .s-fill { display:inline-block; width:0; overflow:hidden; opacity:0; }
    #s-bang { transition: opacity 0.3s ease; }
  </style>
  <!-- SPA redirect restore (works with 404.html for GitHub Pages) -->
  <script>
    (function(l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
      }
    }(window.location))
  </script>
</head>
<body class="bg-[#0c0b09]">
  <!-- Branded startup splash, removed by app JS after the intro animation. -->
  <div id="splash" style="
    position:fixed; inset:0; z-index:9999;
    display:flex; align-items:center; justify-content:center;
    background:#c8b48c;
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
    font-weight:700; font-size:min(15vw,64px); color:#0c0b09;
    transition: opacity 0.5s ease;
  ">
    <span id="s-H">H</span><span class="s-fill" style="display:inline-block;width:0;overflow:hidden;opacity:0">e</span><span class="s-fill" style="display:inline-block;width:0;overflow:hidden;opacity:0">r</span><span class="s-fill" style="display:inline-block;width:0;overflow:hidden;opacity:0">o</span><span id="s-I">I</span><span class="s-fill" style="display:inline-block;width:0;overflow:hidden;opacity:0">n</span><span class="s-fill" style="display:inline-block;width:0;overflow:hidden;opacity:0">c</span><span class="s-fill" style="display:inline-block;width:0;overflow:hidden;opacity:0">o</span><span class="s-fill" style="display:inline-block;width:0;overflow:hidden;opacity:0">m</span><span class="s-fill" style="display:inline-block;width:0;overflow:hidden;opacity:0">e</span><span id="s-bang">!</span>
  </div>
  <script>if(localStorage.getItem('hi-splash-seen-v2'))document.getElementById('splash').style.display='none'</script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
